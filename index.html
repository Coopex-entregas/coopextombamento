<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>COOPEX • Tombamento</title>
  <style>
    :root{color-scheme:light dark;}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#0b1220;color:#e6eefc;}
    header{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);backdrop-filter: blur(10px);}
    .brand{display:flex;align-items:center;gap:12px}
    .brand img{width:40px;height:40px;border-radius:10px;object-fit:cover;background:#0b1220}
    .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
    .brand p{margin:2px 0 0;font-size:12px;opacity:.85}
    main{max-width:980px;margin:0 auto;padding:16px}
    .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .content{padding:16px}
    .row{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){.row{grid-template-columns: 1.1fr .9fr;}}
    .photo{width:100%;aspect-ratio:4/3;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center}
    .photo img{width:100%;height:100%;object-fit:cover}
    .k{font-size:12px;opacity:.8;margin:0}
    .v{font-size:16px;margin:0;font-weight:650;word-break:break-word}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);font-size:12px}
    .muted{opacity:.8}
    .error{padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,80,80,.10)}
    a{color:#9ed0ff}
    footer{padding:14px 16px;opacity:.75;font-size:12px;text-align:center}
  </style>
</head>
<body>
<header>
  <div class="brand">
    <img src="logo.png" alt="COOPEX" onerror="this.style.display='none'">
    <div>
      <h1>COOPEX • Tombamento</h1>
      <p>Escaneou o QR? Ele abre este site e mostra foto e local do item.</p>
    </div>
  </div>
</header>

<main>
  <div id="app" class="card">
    <div class="content">
      <div class="pill">
        <strong>Tombamento:</strong>
        <span id="tcode" class="muted">—</span>
      </div>
      <div style="height:12px"></div>
      <div id="state" class="muted">Carregando…</div>
    </div>
  </div>

  <footer>
    COOPEX Entregas • Patrimônio • <span id="year"></span>
  </footer>
</main>

<script>
const $ = (s)=>document.querySelector(s);
$("#year").textContent = new Date().getFullYear();

function getHashCode(){
  const h = (location.hash || "").replace(/^#/, "").trim();
  return h || null;
}

async function loadItems(){
  const res = await fetch("items.json", {cache:"no-store"});
  if(!res.ok) throw new Error("Não consegui abrir items.json (verifique se ele está na raiz do repositório).");
  const data = await res.json();
  if(!data || !Array.isArray(data.items)) throw new Error("Formato inválido do items.json. Precisa ter { items: [ ... ] }.");
  return data.items;
}

function renderNotFound(code){
  $("#tcode").textContent = code || "—";
  $("#state").innerHTML = `
    <div class="error">
      <div style="font-weight:700;margin-bottom:6px">Item não encontrado</div>
      <div class="muted">Verifique se o tombamento existe no <code>items.json</code> e se você publicou no GitHub Pages.</div>
    </div>`;
}

function renderItem(item){
  $("#tcode").textContent = item.tombamento || "—";
  const foto = item.foto || "";
  const desc = item.descricao || "";
  const local = item.local || "";
  const obs = item.obs || "";

  $("#state").innerHTML = `
    <div class="row">
      <div class="photo">
        ${foto ? `<img src="${foto}" alt="Foto do item" onerror="this.closest('.photo').innerHTML='<div class=muted>Foto não encontrada: ${foto}</div>'">`
               : `<div class="muted">Sem foto</div>`}
      </div>
      <div>
        <p class="k">DESCRIÇÃO</p>
        <p class="v">${escapeHtml(desc) || "—"}</p>
        <div style="height:10px"></div>
        <p class="k">LOCAL</p>
        <p class="v">${escapeHtml(local) || "—"}</p>
        ${obs ? `<div style="height:10px"></div><p class="k">OBSERVAÇÃO</p><p class="v">${escapeHtml(obs)}</p>` : ``}
        <div style="height:12px"></div>
        <div class="pill">Dica: abra com <strong>#COOP-000001</strong> no final do link.</div>
      </div>
    </div>
  `;
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

async function main(){
  const code = getHashCode();
  if(!code){
    $("#state").innerHTML = `
      <div class="muted">
        Cole/abra um link com o tombamento no final, por exemplo:<br>
        <a href="#COOP-000001">#COOP-000001</a>
      </div>`;
    return;
  }
  try{
    const items = await loadItems();
    const found = items.find(x => (x.tombamento || "").toUpperCase() === code.toUpperCase());
    if(!found) return renderNotFound(code);
    renderItem(found);
  }catch(e){
    $("#tcode").textContent = code;
    $("#state").innerHTML = `<div class="error"><strong>Erro:</strong> ${escapeHtml(e.message || String(e))}</div>`;
  }
}

window.addEventListener("hashchange", main);
main();
</script>
</body>
</html>
